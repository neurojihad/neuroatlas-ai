# Jobs require a self-hosted runner tagged neuroatlas-self-hosted (no shared minutes).
# Setup: docs/ci/self-hosted-runner.md
default:
  tags:
    - neuroatlas-self-hosted

variables:
  BASE_IMAGE: python:3.12-slim-bookworm
  RUNNER_IMAGE: python:3.12-slim-bookworm
  BUILD_TAG: $CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
  PATIENTS_IMAGE_NAME: /patients
  ML_IMAGE_NAME: /ml
  HOUSEKEEPER_IMAGE_NAME: /housekeeper

stages:
  - test
  - build

include:
  - infra/ci/test.ci.yml
  - infra/ci/build.ci.yml
