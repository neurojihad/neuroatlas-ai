# GitLab Runner container for Linux hosts with Docker already installed.
#
# Prerequisites:
#   1. Register a runner on the host (scripts/ci/register-gitlab-runner.sh), OR
#   2. Mount an existing config.toml into ./config/
#
# Usage:
#   docker compose -f infra/ci/runner/docker-compose.yml up -d
#
# The runner uses the host Docker socket so CI job images and service containers
# (Postgres, Kaniko) run on the host daemon.

services:
  gitlab-runner:
    image: gitlab/gitlab-runner:latest
    container_name: neuroatlas-gitlab-runner
    restart: unless-stopped
    volumes:
      - gitlab-runner-config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  gitlab-runner-config:
