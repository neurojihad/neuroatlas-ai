name: neuroatlas-infra

networks:
  neuroatlasnet:
    name: neuroatlasnet

volumes:
  pg_data:
  keycloak_data:

services:
  kafka:
    # bitnami/kafka tags were removed from Docker Hub; legacy mirror keeps the same env vars.
    image: bitnamilegacy/kafka:3.7.1
    container_name: kafka_neuroatlas
    restart: always
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - neuroatlasnet
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka-init:
    image: python:3.12-slim
    container_name: kafka_init_neuroatlas
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - pip install -q --no-cache-dir aiokafka python-ulid && python /scripts/init_topics.py
    volumes:
      - ./kafka/init_topics.py:/scripts/init_topics.py:ro
      - ../src:/app/src:ro
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_DOCKER_BOOTSTRAP_SERVERS:-kafka:9092}
      PYTHONPATH: /app/src
    networks:
      - neuroatlasnet
    restart: "no"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres_neuroatlas
    restart: always
    hostname: postgres_neuroatlas
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neuroatlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-neuroatlas}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - neuroatlasnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neuroatlas} -d ${POSTGRES_DB:-neuroatlas}"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 5s

  keycloak:
    profiles: [storage]
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    restart: always
    # Persist realm data across container recreates; import neuroatlas on first start.
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/import:/opt/keycloak/data/import:ro
    networks:
      - neuroatlasnet
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  keycloak-init:
    profiles: [storage]
    image: python:3.12-slim
    container_name: keycloak_init_neuroatlas
    depends_on:
      keycloak:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - pip install -q --no-cache-dir httpx && python /scripts/keycloak/ensure_realm.py
    volumes:
      - ./keycloak:/scripts/keycloak:ro
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    networks:
      - neuroatlasnet
    restart: "no"
