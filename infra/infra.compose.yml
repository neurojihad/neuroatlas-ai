name: neuroatlas-infra

networks:
  neuroatlasnet:
    name: neuroatlasnet

volumes:
  pg_data:

services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka_neuroatlas
    restart: always
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - neuroatlasnet
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka-init:
    image: bitnami/kafka:3.7
    container_name: kafka_init_neuroatlas
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["python", "/scripts/init_topics.py"]
    volumes:
      - ./kafka/init_topics.py:/scripts/init_topics.py:ro
      - ../src:/app/src:ro
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_DOCKER_BOOTSTRAP_SERVERS:-kafka:9092}
      PYTHONPATH: /app/src
    networks:
      - neuroatlasnet
    restart: "no"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres_neuroatlas
    restart: always
    hostname: postgres_neuroatlas
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neuroatlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-neuroatlas}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - neuroatlasnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neuroatlas} -d ${POSTGRES_DB:-neuroatlas}"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 5s
