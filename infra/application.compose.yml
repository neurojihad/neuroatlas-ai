name: neuroatlas-app

x-healthcheck: &healthcheck
  test: ["CMD", "python", "/app/healthcheck.py"]
  interval: 3s
  timeout: 3s
  retries: 10
  start_period: 30s

x-app-env-file: &app-env-file
  env_file:
    - .env

x-common-env: &common-env
  ENVIRONMENT: ${ENVIRONMENT:-local}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  PATIENTS_ROUTE: patients:8000
  ML_ROUTE: ml:8000
  HOUSEKEEPER_ROUTE: housekeeper:8000
  KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_DOCKER_BOOTSTRAP_SERVERS:-kafka:9092}

x-oidc-docker-env: &oidc-docker-env
  AUTH_ENABLED: ${AUTH_ENABLED:-false}
  USER_UPSERT_ENABLED: ${USER_UPSERT_ENABLED:-true}
  OIDC_JWKS_URL: ${OIDC_DOCKER_JWKS_URL:-http://keycloak:8080/realms/neuroatlas/protocol/openid-connect/certs}
  OIDC_ISSUER: ${OIDC_DOCKER_ISSUER:-http://localhost:8080/realms/neuroatlas}
  OIDC_AUDIENCE: ${OIDC_AUDIENCE:-neuroatlas-api}

x-admin-ui-env: &admin-ui-env
  <<: *oidc-docker-env
  KEYCLOAK_URL: ${KEYCLOAK_DOCKER_URL:-http://keycloak:8080}
  KEYCLOAK_BROWSER_URL: ${KEYCLOAK_BROWSER_URL:-http://localhost:8080}

networks:
  neuroatlasnet:
    name: neuroatlasnet
    external: true

services:
  patients:
    <<: *app-env-file
    image: patients:local
    container_name: patients
    restart: always
    build:
      context: ../.
      dockerfile: src/patients/Dockerfile
    hostname: patients
    environment:
      <<: [*common-env, *oidc-docker-env]
      POSTGRES_URI: postgresql+asyncpg://${POSTGRES_USER:-neuroatlas}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-neuroatlas}
    ports:
      - "8001:8000"
    networks:
      - neuroatlasnet
    healthcheck: *healthcheck

  ml:
    <<: *app-env-file
    image: ml:local
    container_name: ml
    restart: always
    build:
      context: ../.
      dockerfile: src/ml/Dockerfile
    hostname: ml
    environment:
      <<: *common-env
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-ml}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-ml}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
    ports:
      - "8002:8000"
    networks:
      - neuroatlasnet
    healthcheck: *healthcheck

  housekeeper:
    <<: *app-env-file
    image: housekeeper:local
    container_name: housekeeper
    restart: always
    build:
      context: ../.
      dockerfile: src/housekeeper/Dockerfile
    hostname: housekeeper
    environment:
      <<: *common-env
      POSTGRES_URI: postgresql+asyncpg://${POSTGRES_USER:-neuroatlas}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-neuroatlas}
    ports:
      - "8003:8000"
    networks:
      - neuroatlasnet
    healthcheck: *healthcheck

  admin_ui:
    <<: *app-env-file
    image: admin_ui:local
    container_name: admin_ui
    restart: always
    build:
      context: ../.
      dockerfile: src/admin_ui/Dockerfile
    hostname: admin_ui
    environment:
      <<: [*common-env, *admin-ui-env]
    ports:
      - "8000:8000"
    networks:
      - neuroatlasnet
    depends_on:
      patients:
        condition: service_healthy
    healthcheck: *healthcheck
