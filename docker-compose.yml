services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neuroatlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-neuroatlas}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  patients:
    build:
      context: .
      dockerfile: src/patients/Dockerfile
    environment:
      POSTGRES_URI: postgresql+asyncpg://${POSTGRES_USER:-neuroatlas}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-neuroatlas}
    ports:
      - "8001:8000"
    depends_on:
      - postgres

  ml:
    build:
      context: .
      dockerfile: src/ml/Dockerfile
    ports:
      - "8002:8000"

  housekeeper:
    build:
      context: .
      dockerfile: src/housekeeper/Dockerfile
    environment:
      POSTGRES_URI: postgresql+asyncpg://${POSTGRES_USER:-neuroatlas}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-neuroatlas}
    ports:
      - "8003:8000"
    depends_on:
      - postgres

  migrations:
    build:
      context: .
      dockerfile: src/housekeeper/Dockerfile
    environment:
      POSTGRES_URI: postgresql+asyncpg://${POSTGRES_USER:-neuroatlas}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-neuroatlas}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      - postgres
    restart: "no"

volumes:
  pg_data:
